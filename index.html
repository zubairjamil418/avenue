<!--
  ===============================
  AVENUE ECOMMERCE MANAGEMENT SYSTEM MOCKUP
  ===============================
  Each section is commented for easy future changes.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<!-- Meta and Title Section -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avenue | Curated Fashion</title>
<!-- Google Fonts (Poppins + Playfair Display for logo) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Favicon (SVG) -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- Fallback PNG touch icon (optional) -->
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="theme-color" content="#F37021">
<style>
/*
  ===============================
  GLOBAL STYLES & VARIABLES
  ===============================
  - CSS variables for colors, layout
  - Base element resets
*/
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black: #000000;
  --brand-black: #000000;
  --white: #ffffff;
  --brand-orange: #F37021; /* RGB: 243,112,33 */
  --footer-bg: #f5f5f5;
  --footer-text: #222222;
  --brand-green: #0b2f1e;
  --brand-gold: #b88b55;
  --site-gutter: 3rem;
  --footer-gutter: calc(var(--site-gutter) + 2rem);
  --gray-50: #fafafa;
  --gray-100: #f5f5f5;
  --gray-200: #eeeeee;
  --gray-300: #e0e0e0;
  --gray-400: #bdbdbd;
  --gray-500: #9e9e9e;
  --gray-600: #757575;
  --gray-700: #616161;
  --gray-800: #424242;
  --gray-900: #212121;
  --red: #c62828;
  --green: #2e7d32;
  --nav-height: 64px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--white);
  color: var(--brand-black);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
}
a { color: inherit; text-decoration: none; }
button { font-family: 'Poppins', sans-serif; cursor: pointer; }
input, select, textarea {
  font-family: 'Poppins', sans-serif;
  font-size: 0.95rem;
}

/*
  ===============================
  LAYOUT CLASSES
  ===============================
  - Page wrapper, container, content
*/
.page { min-height: 100vh; display: flex; flex-direction: column; }
.page-content { flex: 1; padding-top: var(--nav-height); }
.container { max-width: 1280px; margin: 0 auto; padding: 0 var(--site-gutter); }

/*
  ===============================
  HEADER & NAVIGATION
  ===============================
  - Fixed header, logo, nav links, icons
*/
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
  background: var(--black); color: var(--white); z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--site-gutter); box-shadow: 0 2px 12px rgba(0,0,0,0.35);
}
.header-left { display: flex; align-items: center; gap: 2.5rem; }
.logo {
  font-family: 'Playfair Display', serif; font-size: 1.6rem;
  font-weight: 400; letter-spacing: 0.08em; text-transform: none;
  color: var(--white);
}
/* Center the logo visually while keeping nav left/right items */
.header .logo {
  position: absolute; left: 50%; transform: translateX(-50%); z-index: 1100;
  height: var(--nav-height); display:flex; align-items:center; gap:0.5rem;
}
.logo img.logo-img { height: 36px; width: auto; display: block; }
.logo .logo-text { display: inline-block; font-family: 'Playfair Display', serif; font-weight:400; letter-spacing:0.12em; text-transform:uppercase; font-size:1.4rem; }
@media (max-width: 768px) {
  .logo img.logo-img { height: 30px; }
}
.nav-links { display: flex; gap: 1.75rem; list-style: none; align-items: center; }
.nav-links a, .nav-links button {
  font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
  font-weight: 500; color: rgba(255,255,255,0.85); background: none; border: none;
  transition: color 0.2s; padding: 0.25rem 0;
}
.nav-links a:hover, .nav-links button:hover { color: var(--white); }
.nav-links a.active { color: var(--white); border-bottom: 1px solid rgba(255,255,255,0.08); }

.header-right { display: flex; align-items: center; gap: 1rem; }
.icon-btn {
  background: none; border: none; cursor: pointer; position: relative;
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; color: var(--white);
}
.icon-btn svg { width: 20px; height: 20px; }
.badge {
  position: absolute; top: -2px; right: -2px; background: var(--black);
  color: var(--white); font-size: 0.6rem; font-weight: 600;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.search-bar {
  display: flex; align-items: center; gap: 0.5rem;
  background: rgba(255,255,255,0.06); border-radius: 4px; padding: 0.45rem 0.9rem;
}
.search-bar input {
  background: none; border: none; outline: none; font-size: 0.85rem;
  width: 180px; color: rgba(255,255,255,0.95);
}

/* Dropdown */
.dropdown { position: relative; }
.dropdown-menu {
  position: absolute; top: 100%; left: 0; margin-top: 0.5rem;
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: 4px; min-width: 180px; padding: 0.5rem 0;
  opacity: 0; visibility: hidden; transform: translateY(-4px);
  transition: all 0.2s; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
.dropdown.open .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
.dropdown-menu a, .dropdown-menu button {
  display: block; width: 100%; text-align: left; padding: 0.5rem 1rem;
  font-size: 0.8rem; color: var(--gray-700); background: none; border: none;
}
.dropdown-menu a:hover, .dropdown-menu button:hover { background: var(--gray-50); color: var(--black); }

.nav-links li { position: static; }
/* Mega menu styles (centered within the header, constrained to site width) */
.has-mega .mega-menu {
  position: absolute; left: 50%; top: 100%; width: 100%; max-width: 100%;
  opacity: 0; visibility: hidden; transform: translate(-50%, -8px);
  transition: all 0.18s ease; z-index: 4000; pointer-events: none;
  background: var(--gray-50); box-shadow: 0 12px 40px rgba(0,0,0,0.06);
}
.has-mega:hover .mega-menu, .has-mega:focus-within .mega-menu, .mega-menu.open { opacity: 1; visibility: visible; transform: translate(-50%, 0); pointer-events: auto; }
.mega-menu .mega-inner {
  max-width: 1280px; margin: 0 auto; display: grid;
  grid-template-columns: 200px 220px 1fr 1fr; gap: 2rem; padding: 28px 2.5rem; background: var(--white);
  border-top: 1px solid var(--gray-100);
}
.mega-col h5 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gray-600); margin-bottom: 1rem; }
.mega-col ul { list-style: none; padding: 0; margin: 0; }
.mega-col li { margin-bottom: 0.75rem; }
.mega-col a { color: var(--brand-black); font-size: 0.95rem; }
.mega-inner .mega-col { padding-right: 1.25rem; border-right: 1px solid var(--gray-100); }
.mega-inner .mega-col:last-child { border-right: none; padding-right: 0; }
/* Constrain images in the mega menu to a small fixed thumbnail size so they don't expand
   to fill the entire column. Targets the non-list columns inside .mega-inner. */
.mega-inner > div:not(.mega-col) { display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-start; }
.mega-inner > div:not(.mega-col) img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  display: block;
  border-radius: 2px;
}
.mega-caption { margin-top: 0.6rem; font-weight: 600; color: var(--brand-black); }
@media (max-width: 1280px) {
  .mega-inner > div:not(.mega-col) img { width: 160px; height: 160px; }
}
@media (max-width: 1024px) { .has-mega .mega-menu { display: none !important; } }

/* Mobile */
.hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; }
.hamburger span { display: block; width: 22px; height: 1.5px; background: var(--white); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.75rem 1.75rem; font-size: 0.72rem; letter-spacing: 0.15em;
  text-transform: uppercase; font-weight: 500; border: none; cursor: pointer;
  transition: all 0.3s; border-radius: 2px;
}
.btn-primary { background: var(--black); color: var(--white); }
.btn-primary:hover { background: var(--gray-800); }
.btn-outline { background: transparent; color: var(--black); border: 1px solid var(--black); }
.btn-outline:hover { background: var(--black); color: var(--white); }
.btn-ghost { background: transparent; color: var(--gray-600); }
.btn-ghost:hover { color: var(--black); }
.btn-danger { background: var(--red); color: var(--white); }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.65rem; }
.btn-lg { padding: 1rem 2.5rem; font-size: 0.8rem; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Green CTA used in in-store section */
.btn-cta {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0.75rem 1.5rem; background: var(--brand-green); color: var(--white);
  border-radius: 4px; border: none; font-weight: 600; text-transform: none;
}

/* ── Cart Drawer ── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000;
  opacity: 0; visibility: hidden; transition: all 0.3s;
}
.drawer-overlay.open { opacity: 1; visibility: visible; }
.cart-drawer {
  position: fixed; top: 0; right: 0; width: 420px; max-width: 100%;
  height: 100%; background: var(--white); z-index: 2001;
  transform: translateX(100%); transition: transform 0.35s ease;
  display: flex; flex-direction: column;
}
.cart-drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 1.5rem 2rem; border-bottom: 1px solid var(--gray-200);
  display: flex; justify-content: space-between; align-items: center;
}
/* Loader styles */
#loader {
  position: fixed;
  z-index: 5000;
  inset: 0;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s;
}
#loader .spinner {
  border: 4px solid var(--gray-200);
  border-top: 4px solid var(--black);
  border-radius: 50%;
  width: 48px;
  height: 48px;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader.hidden { opacity: 0; pointer-events: none; }

/* Under Development Modal styles */
#devModal {
  position: fixed;
  z-index: 6000;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
}
#devModal .modal-box {
  background: var(--white);
  padding: 2.5rem 2rem;
  border-radius: 8px;
  max-width: 350px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  text-align: center;
  position: relative;
}
#devModal .close-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--gray-500);
  cursor: pointer;
}
#devModal .countdown {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin: 1.5rem 0 0.5rem;
}
#devModal .cd-box {
  background: var(--gray-100);
  border-radius: 4px;
  padding: 0.5rem 0.75rem;
  min-width: 40px;
  font-size: 1.2rem;
  font-family: monospace;
  font-weight: 600;
}
#devModal .cd-label {
  display: block;
  font-size: 0.7rem;
  color: var(--gray-500);
  margin-top: 0.2rem;
}

.drawer-header h3 { font-size: 1.3rem; }
.drawer-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
.drawer-body { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
.drawer-footer {
  padding: 1.5rem 2rem; border-top: 1px solid var(--gray-200);
}
.drawer-empty { text-align: center; color: var(--gray-500); padding: 3rem 0; }

.cart-item {
  display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--gray-100);
}
.cart-item img { width: 70px; height: 90px; object-fit: cover; border-radius: 2px; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 0.25rem; }
.cart-item-meta { font-size: 0.75rem; color: var(--gray-500); }
.cart-item-price { font-size: 0.85rem; font-weight: 500; margin-top: 0.5rem; }
.cart-item-actions { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; }
.qty-btn {
  width: 24px; height: 24px; border: 1px solid var(--gray-300); background: none;
  display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
}
.remove-btn { color: var(--gray-400); background: none; border: none; font-size: 0.75rem; }
.remove-btn:hover { color: var(--red); }

.drawer-subtotal {
  display: flex; justify-content: space-between; margin-bottom: 1rem;
  font-size: 0.9rem;
}
.drawer-subtotal strong { font-size: 1.1rem; }
.drawer-btns { display: flex; flex-direction: column; gap: 0.75rem; }

/* ── Toast ── */
.toast-container {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 3000;
  display: flex; flex-direction: column; gap: 0.75rem;
}
.toast {
  background: var(--black); color: var(--white); padding: 1rem 1.5rem;
  border-radius: 4px; font-size: 0.85rem; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  animation: toastIn 0.3s ease; display: flex; align-items: center; gap: 0.75rem;
}
.toast.leaving { animation: toastOut 0.3s ease forwards; }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

/* ── Skeleton ── */
.skeleton {
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
  background-size: 200% 100%; animation: shimmer 1s infinite;
  border-radius: 2px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Confirmation Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; transition: all 0.2s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-box {
  background: var(--white); padding: 2rem; border-radius: 4px;
  max-width: 400px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}
.modal-box h3 { font-size: 1.4rem; margin-bottom: 0.75rem; }
.modal-box p { font-size: 0.9rem; color: var(--gray-600); margin-bottom: 1.5rem; }
.modal-actions { display: flex; gap: 1rem; justify-content: flex-end; }

/* ── Footer ── */
.footer {
  background: var(--footer-bg); color: var(--footer-text); padding: 4rem var(--footer-gutter) 2rem;
}
.footer-grid {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 3rem;
  padding-bottom: 3rem; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.footer-brand { display:flex; align-items:center; justify-content:center; gap:0.6rem; margin-bottom: 1rem; }
.footer-brand .footer-logo { height: 36px; width: auto; display:block; }
.footer-brand .footer-logo-text { font-family: 'Playfair Display', serif; font-weight:400; font-size:1.6rem; color: var(--brand-black); text-transform:uppercase; letter-spacing:0.12em; }
.footer-desc { font-size: 0.95rem; color: rgba(34,34,34,0.9); line-height: 1.7; max-width: 320px; }
.footer-column h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 1rem; font-weight: 600; color: rgba(34,34,34,0.9); }
.footer-column ul { list-style: none; padding: 0; }
.footer-column li { margin-bottom: 0.6rem; }
.footer-column a { font-size: 0.9rem; color: rgba(34,34,34,0.75); transition: color 0.15s; }
.footer-column a:hover { color: var(--brand-orange); }
.footer-bottom {
  max-width: 1280px; margin: 0 auto; padding-top: 2rem;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85rem; color: rgba(34,34,34,0.6);
}
.payment-icons { display: flex; gap: 0.75rem; }
.payment-icon {
  width: 44px; height: 28px; background: rgba(0,0,0,0.04); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(34,34,34,0.9);
}

/* ── Breadcrumb ── */
.breadcrumb {
  padding: 1.25rem 0; font-size: 0.75rem; color: var(--gray-500);
  border-bottom: 1px solid var(--gray-100); margin-bottom: 2rem;
}
.breadcrumb a { color: var(--gray-500); transition: color 0.2s; }
.breadcrumb a:hover { color: var(--black); }
.breadcrumb span { margin: 0 0.5rem; }

/* ── Product Card ── */
.product-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
}
.product-card {
  position: relative; cursor: pointer; group: true;
}
.product-card-img {
  position: relative; overflow: hidden; background: var(--gray-50);
  aspect-ratio: 3/4;
}
.product-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s ease;
}
.product-card:hover .product-card-img img { transform: scale(1.05); }
.product-card-wish {
  position: absolute; top: 0.75rem; right: 0.75rem;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--white); border: none; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  opacity: 0; transform: scale(0.8); transition: all 0.3s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.product-card:hover .product-card-wish { opacity: 1; transform: scale(1); }
.product-card-wish.wishlisted svg { fill: var(--red); stroke: var(--red); }
.product-card-wish svg { width: 14px; height: 14px; }
.product-card-quick {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--black); color: var(--white); text-align: center;
  padding: 0.75rem; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.product-card:hover .product-card-quick { transform: translateY(0); }
.product-card-body { padding: 1rem 0.25rem; }
.product-card-cat { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-500); margin-bottom: 0.35rem; }
.product-card-name { font-family: 'Poppins', sans-serif; font-size: 1.15rem; margin-bottom: 0.5rem; line-height: 1.3; }
.product-card-price { font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
.product-card-price .sale { color: var(--gray-400); text-decoration: line-through; }
.product-card-price .current { font-weight: 500; }
.stock-badge { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.5rem; }
.stock-badge.in { color: var(--green); }
.stock-badge.low { color: #e65100; }
.stock-badge.out { color: var(--red); }

/* ── Forms ── */
.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; color: var(--gray-600); font-weight: 500; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--gray-300);
  background: var(--white); color: var(--black); outline: none;
  transition: border-color 0.2s; border-radius: 2px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--black); }
.form-input::placeholder { color: var(--gray-400); }
.form-error { font-size: 0.75rem; color: var(--red); margin-top: 0.35rem; }
.form-hint { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.35rem; }

/* ── Pagination ── */
.pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 3rem; }
.page-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gray-300); background: none; font-size: 0.8rem; cursor: pointer;
}
.page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Tabs ── */
.tabs { display: flex; gap: 2rem; border-bottom: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
.tab-btn {
  background: none; border: none; padding: 0.75rem 0; font-size: 0.8rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-btn.active { color: var(--black); border-bottom-color: var(--black); }

/* ── Admin Layout ── */
.admin-layout { display: flex; min-height: 100vh; }
.admin-sidebar {
  width: 240px; background: var(--black); color: var(--white);
  padding: 2rem 1.5rem; position: fixed; height: 100vh; overflow-y: auto;
}
.admin-sidebar .logo { color: var(--white); margin-bottom: 2.5rem; display: block; }
.admin-nav { list-style: none; }
.admin-nav li { margin-bottom: 0.25rem; }
.admin-nav a, .admin-nav button {
  display: block; padding: 0.6rem 0.75rem; color: var(--gray-400);

// ── Under Development Modal Countdown ──
(function() {
    // Set your launch date here (YYYY-MM-DDTHH:MM:SSZ or local)
    var launchDate = new Date('2026-06-15T12:00:00'); // Example: June 15, 2026, noon
    var modal = document.getElementById('devModal');
    var closeBtn = document.getElementById('closeDevModal');
    function updateCountdown() {
        var now = new Date();
        var diff = launchDate - now;
        if (diff < 0) diff = 0;
        var days = Math.floor(diff / (1000 * 60 * 60 * 24));
        var hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        var minutes = Math.floor((diff / (1000 * 60)) % 60);
        var seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('cdDays').textContent = String(days).padStart(2, '0');
        document.getElementById('cdHours').textContent = String(hours).padStart(2, '0');
        document.getElementById('cdMinutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('cdSeconds').textContent = String(seconds).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
    // Optional: allow closing modal
    closeBtn.addEventListener('click', function() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
    });
    // Prevent scrolling when modal is open
    document.body.style.overflow = 'hidden';
})();

function formatPrice(p) { return '£' + p.toLocaleString(); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
function getProduct(slug) { return products.find(p => p.slug === slug); }
function getProductById(id) { return products.find(p => p.id === id); }
function getCategory(slug) { return categories.find(c => c.slug === slug); }
function getOrder(id) { return orders.find(o => o.id === id); }
function getCustomer(id) { return customers.find(c => c.id == id); }

function showToast(msg, type='success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function confirmDelete(msg, onConfirm) {
  const overlay = document.getElementById('confirmModal');
  const text = document.getElementById('confirmText');
  const yes = document.getElementById('confirmYes');
  const no = document.getElementById('confirmNo');
  text.textContent = msg;
  overlay.classList.add('open');
  const handler = () => {
    overlay.classList.remove('open');
    onConfirm();
    yes.removeEventListener('click', handler);
  };
  yes.addEventListener('click', handler);
  no.onclick = () => overlay.classList.remove('open');
}

function refreshCartDrawer() {
  const wrapper = document.getElementById('cartWrapper');
  if (!wrapper) return;
  const wasOpen = document.getElementById('cartDrawer')?.classList.contains('open');
  wrapper.innerHTML = renderCartDrawer();
  if (wasOpen) {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartOverlay').classList.add('open');
  }
}
function addToCart(productId, qty=1) {
  const item = state.cart.find(i => i.productId === productId);
  if (item) item.qty += qty; else state.cart.push({productId, qty});
  persist();
  updateCartBadge();
  refreshCartDrawer();
  showToast('Added to cart');
}
function removeFromCart(productId) {
  state.cart = state.cart.filter(i => i.productId !== productId);
  persist(); updateCartBadge();
  refreshCartDrawer();
  showToast('Removed from cart');
}
function updateQty(productId, qty) {
  const item = state.cart.find(i => i.productId === productId);
  if (item) { item.qty = qty; if (item.qty <= 0) removeFromCart(productId); else persist(); }
  updateCartBadge();
  refreshCartDrawer();
}
function clearCart() { state.cart = []; persist(); updateCartBadge(); refreshCartDrawer(); }
function cartTotal() { return state.cart.reduce((sum, i) => sum + (getProductById(i.productId)?.price||0)*i.qty, 0); }
function cartCount() { return state.cart.reduce((s, i) => s + i.qty, 0); }
function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  if (badge) { const c = cartCount(); badge.textContent = c; badge.style.display = c ? 'flex' : 'none'; }
}
function updateWishlistBadge() {
  const badge = document.getElementById('wishlistBadge');
  if (badge) { const c = state.wishlist.length; badge.textContent = c; badge.style.display = c ? 'flex' : 'none'; }
}
function toggleWishlist(productId) {
  const idx = state.wishlist.indexOf(productId);
  if (idx > -1) { state.wishlist.splice(idx, 1); showToast('Removed from wishlist'); }
  else { state.wishlist.push(productId); showToast('Added to wishlist'); }
  persist(); updateWishlistBadge();
}
function isWishlisted(pid) { return state.wishlist.includes(pid); }

function login(email, password, asAdmin=false) {
  state.user = { name: asAdmin ? 'Admin User' : 'Alex Morgan', email: email || 'alex@example.com' };
  state.isAdmin = asAdmin;
  persist();
  updateUserMenu();
}
function logout() {
  state.user = null; state.isAdmin = false; state.wishlist = []; state.savedAddresses = [];
  persist(); updateUserMenu(); updateWishlistBadge();
  showToast('Logged out');
}

function starRating(rating) {
  let html = '<div class="stars">';
  for (let i=1;i<=5;i++) {
    if (i <= Math.floor(rating)) html += icons.star;
    else if (i === Math.ceil(rating) && !Number.isInteger(rating)) html += icons.star;
    else html += `<svg class="empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  }
  html += '</div>'; return html;
}

function productCard(p, opts={}) {
  const price = p.salePrice ? `<span class="sale">${formatPrice(p.price)}</span><span class="current">${formatPrice(p.salePrice)}</span>` : `<span class="current">${formatPrice(p.price)}</span>`;
  const stockClass = p.stock === 0 ? 'out' : p.stock <= 5 ? 'low' : 'in';
  const stockText = p.stock === 0 ? 'Out of stock' : p.stock <= 5 ? 'Low stock' : 'In stock';
  const wishClass = isWishlisted(p.id) ? 'wishlisted' : '';
  return `
  <div class="product-card" onclick="navigate('/products/${p.slug}')">
    <div class="product-card-img">
      <img src="${p.image}" alt="${p.name}" loading="lazy">
      <button class="product-card-wish ${wishClass}" onclick="event.stopPropagation(); toggleWishlist(${p.id}); renderCurrentPage();" aria-label="Wishlist">${icons.heart}</button>
      ${p.stock > 0 ? `<div class="product-card-quick" onclick="event.stopPropagation(); addToCart(${p.id}); renderCurrentPage();">Quick Add</div>` : ''}
    </div>
    <div class="product-card-body">
      <div class="product-card-cat">${getCategory(p.category)?.name || p.category}</div>
      <div class="product-card-name">${p.name}</div>
      <div class="product-card-price">${price}</div>
      ${opts.showStock !== false ? `<div class="stock-badge ${stockClass}">${stockText}</div>` : ''}
    </div>
  </div>`;
}

function renderCartDrawer() {

    <div class="cart-item">
      <img src="${p.image}" alt="${p.name}">
      <div class="cart-item-info">

function navigate(path) { window.location.hash = '#' + path; }

function parseRoute() {
  const hash = window.location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  if (hash === '/') return { page: 'home' };
  if (parts[0] === 'products' && parts[1]) return { page: 'product-detail', slug: parts[1] };
  if (parts[0] === 'products') return { page: 'products' };
  if (parts[0] === 'categories' && parts[1]) return { page: 'category', slug: parts[1] };
  if (parts[0] === 'search') return { page: 'search', q: new URLSearchParams(hash.split('?')[1]).get('q') || '' };
  if (parts[0] === 'cart') return { page: 'cart' };
  if (parts[0] === 'checkout' && parts[1] === 'shipping') return { page: 'checkout-shipping' };
  if (parts[0] === 'checkout' && parts[1] === 'review') return { page: 'checkout-review' };
  if (parts[0] === 'checkout' && parts[1] === 'payment') return { page: 'checkout-payment' };
  if (parts[0] === 'checkout' && parts[1] === 'success') return { page: 'checkout-success' };
  if (parts[0] === 'login') return { page: 'login' };
  if (parts[0] === 'register') return { page: 'register' };
  if (parts[0] === 'forgot-password') return { page: 'forgot-password' };
  if (parts[0] === 'account' && parts[1] === 'orders' && parts[2]) return { page: 'account-order-detail', id: parts[2] };
  if (parts[0] === 'account' && parts[1] === 'orders') return { page: 'account-orders' };
  if (parts[0] === 'account' && parts[1] === 'wishlist') return { page: 'account-wishlist' };
  if (parts[0] === 'account' && parts[1] === 'settings') return { page: 'account-settings' };
  if (parts[0] === 'account') return { page: 'account' };
  if (parts[0] === 'admin' && parts[1] === 'products' && parts[2] === 'new') return { page: 'admin-product-new' };
  if (parts[0] === 'admin' && parts[1] === 'products' && parts[2] && parts[3] === 'edit') return { page: 'admin-product-edit', id: parts[2] };
  if (parts[0] === 'admin' && parts[1] === 'products') return { page: 'admin-products' };
  if (parts[0] === 'admin' && parts[1] === 'categories') return { page: 'admin-categories' };
  if (parts[0] === 'admin' && parts[1] === 'orders' && parts[2]) return { page: 'admin-order-detail', id: parts[2] };
  if (parts[0] === 'admin' && parts[1] === 'orders') return { page: 'admin-orders' };
  if (parts[0] === 'admin' && parts[1] === 'customers' && parts[2]) return { page: 'admin-customer-detail', id: parts[2] };
  if (parts[0] === 'admin' && parts[1] === 'customers') return { page: 'admin-customers' };
  if (parts[0] === 'admin') return { page: 'admin' };
  return { page: 'not-found' };
}

function renderCurrentPage() {
  const app = document.getElementById('app');
  const route = parseRoute();
  let content = '';

  if (route.page.startsWith('admin')) {
    // Admin pages have their own layout
    if (!state.isAdmin) { content = renderAdminLoginGate(); }
    else { content = renderAdminPage(route); }
    app.innerHTML = content + renderModals();
    attachPageEvents(route); return;
  }

  switch(route.page) {
    case 'home': content = renderHome(); break;
    case 'products': content = renderProducts(); break;
    case 'product-detail': content = renderProductDetail(route.slug); break;
    case 'category': content = renderCategory(route.slug); break;
    case 'search': content = renderSearch(route.q); break;
    case 'cart': content = renderCart(); break;
    case 'checkout-shipping': content = renderCheckoutShipping(); break;
    case 'checkout-review': content = renderCheckoutReview(); break;
    case 'checkout-payment': content = renderCheckoutPayment(); break;
    case 'checkout-success': content = renderCheckoutSuccess(); break;
    case 'login': content = renderLogin(); break;
    case 'register': content = renderRegister(); break;
    case 'forgot-password': content = renderForgotPassword(); break;
    case 'account': content = renderAccount(); break;
    case 'account-orders': content = renderAccountOrders(); break;
    case 'account-order-detail': content = renderAccountOrderDetail(route.id); break;
    case 'account-wishlist': content = renderAccountWishlist(); break;
    case 'account-settings': content = renderAccountSettings(); break;
    default: content = renderNotFound();
  }

  resetUsedProductIds();
  app.innerHTML = renderHeader() + `<div class="page"><div class="page-content">${content}</div>${renderFooter()}</div><div id="cartWrapper">` + renderCartDrawer() + `</div>` + renderModals();
  updateCartBadge(); updateWishlistBadge(); updateUserMenu();
  attachPageEvents(route);
  window.scrollTo(0,0);
}

function attachPageEvents(route) {
  // Close dropdowns and mega menus on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    }
    if (!e.target.closest('.has-mega')) {
      document.querySelectorAll('.mega-menu.open').forEach(m => m.classList.remove('open'));
    }
  });
  // Initialize filters on product listing pages after skeleton delay
  if (route.page === 'products' || route.page === 'category') {
    setTimeout(() => { if (document.getElementById('productGrid')) applyFilters(); }, 500);
  }
  // Reveal product detail content after skeleton delay
  if (route.page === 'product-detail') {
    setTimeout(() => {
      const skel = document.getElementById('detailSkeleton');
      const content = document.getElementById('detailContent');
      if (skel && content) { skel.classList.add('hidden'); content.classList.remove('hidden'); }
    }, 500);
  }
  // Mega menu hover delay: keep the menu open briefly while the cursor travels
  (function setupMegaHover() {
    const HIDE_DELAY = 400; // ms
    document.querySelectorAll('.nav-links li.has-mega').forEach(li => {
      const menu = li.querySelector('.mega-menu');
      if (!menu) return;
      let hideTimer = null;
      const clearHide = () => { if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; } };
      li.addEventListener('mouseenter', () => { clearHide(); menu.classList.add('open'); });
      li.addEventListener('mouseleave', () => { clearHide(); hideTimer = setTimeout(() => menu.classList.remove('open'), HIDE_DELAY); });
      menu.addEventListener('mouseenter', () => { clearHide(); menu.classList.add('open'); });
      menu.addEventListener('mouseleave', () => { clearHide(); hideTimer = setTimeout(() => menu.classList.remove('open'), HIDE_DELAY); });
      // keyboard accessibility: open on focus, close on blur after delay
      li.querySelectorAll('a,button').forEach(el => {
        el.addEventListener('focus', () => { clearHide(); menu.classList.add('open'); });
        el.addEventListener('blur', () => { clearHide(); hideTimer = setTimeout(() => menu.classList.remove('open'), HIDE_DELAY); });
      });
    });
  })();
}

function applyFilters() {
  const grid = document.getElementById('productGrid');
  if (!grid) return;
  const allIds = JSON.parse(grid.dataset.all || '[]');
  let result = products.filter(p => allIds.includes(p.id));

  const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value);
  if (cats.length) result = result.filter(p => cats.includes(p.category));

  const min = parseFloat(document.getElementById('minPrice')?.value) || 0;
  const max = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
  result = result.filter(p => {
    const price = p.salePrice || p.price;
    return price >= min && price <= max;
  });

  if (document.getElementById('inStockOnly')?.checked) result = result.filter(p => p.stock > 0);

  const sort = document.getElementById('sortSelect')?.value || 'newest';
  if (sort === 'price-asc') result.sort((a,b) => (a.salePrice||a.price) - (b.salePrice||b.price));
  if (sort === 'price-desc') result.sort((a,b) => (b.salePrice||b.price) - (a.salePrice||a.price));
  if (sort === 'name') result.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'newest') result.sort((a,b) => (b.new?1:0) - (a.new?1:0));

  document.getElementById('resultCount').textContent = `Showing ${result.length} products`;

  // Pagination: 12 per page
  const perPage = 12;
  const totalPages = Math.ceil(result.length / perPage) || 1;
  const currentPage = parseInt(document.querySelector('.page-btn.active')?.dataset.page) || 1;
  const start = (currentPage - 1) * perPage;
  const pageItems = result.slice(start, start + perPage);

  grid.innerHTML = pageItems.map(p => productCard(p)).join('');

  let pagHTML = '';
  for (let i=1;i<=totalPages;i++) {
    pagHTML += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}" onclick="setPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = pagHTML;
}

function setPage(n) {
  document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.page-btn[data-page="${n}"]`)?.classList.add('active');
  applyFilters();
}

function checkoutProgress(current) {
  const steps = ['shipping','review','payment'];
  const labels = {shipping:'Shipping',review:'Review',payment:'Payment'};
  let html = '<div class="progress-bar">';
  steps.forEach((s,i) => {
    const cls = s === current ? 'active' : steps.indexOf(current) > i ? 'completed' : '';
    html += `<div class="progress-step ${cls}"><div class="progress-dot">${steps.indexOf(current) > i ? '&#10003;' : i+1}</div>${labels[s]}</div>`;
    if (i < 2) html += `<div class="progress-line ${steps.indexOf(current) > i ? 'completed' : ''}"></div>`;
  });
  return html + '</div>';
}

    {href:'/admin/products',label:'Products'},
    {href:'/admin/categories',label:'Categories'},
    {href:'/admin/orders',label:'Orders'},
    {href:'/admin/customers',label:'Customers'}
  ];
  return `
  <aside class="admin-sidebar">
    <a href="#/admin" class="logo">Avenue</a>
    <ul class="admin-nav">
      ${links.map(l => `<li><a href="#${l.href}" class="${active===l.href?'active':''}">${l.label}</a></li>`).join('')}
    </ul>
    <div style="margin-top:auto;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.1)">
      <a href="#/account" style="color:var(--gray-400);font-size:0.8rem">Back to Store</a>
    </div>
  </aside>`;
}

function adminSidebarPath(page) {
  const map = {
    'admin': '/admin',
    'admin-products': '/admin/products',
    'admin-product-new': '/admin/products',
    'admin-product-edit': '/admin/products',
    'admin-categories': '/admin/categories',
    'admin-orders': '/admin/orders',
    'admin-order-detail': '/admin/orders',
    'admin-customers': '/admin/customers',
    'admin-customer-detail': '/admin/customers'
  };
  return map[page] || '/admin';
}

function renderAdminPage(route) {
  let content = '';
  switch(route.page) {
    case 'admin': content = renderAdminDashboard(); break;
    case 'admin-products': content = renderAdminProducts(); break;
    case 'admin-product-new': content = renderAdminProductForm(); break;
    case 'admin-product-edit': content = renderAdminProductForm(route.id); break;
    case 'admin-categories': content = renderAdminCategories(); break;
    case 'admin-orders': content = renderAdminOrders(); break;
    case 'admin-order-detail': content = renderAdminOrderDetail(route.id); break;
    case 'admin-customers': content = renderAdminCustomers(); break;
    case 'admin-customer-detail': content = renderAdminCustomerDetail(route.id); break;
    default: content = renderAdminDashboard();
  }
  return `<div class="admin-layout">${adminSidebar(adminSidebarPath(route.page))}</div><div class="admin-main">${content}</div>`;
}

function renderAdminDashboard() {
  const totalOrders = orders.length;
  const revenue = orders.reduce((s,o) => s + (o.status !== 'cancelled' ? o.total : 0), 0);
  const lowStock = products.filter(p => p.stock <= 5).length;
  return `
  <div class="admin-header"><h1>Dashboard</h1></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">${totalOrders}</div></div>
    <div class="stat-card"><div class="stat-label">Monthly Revenue</div><div class="stat-value">${formatPrice(revenue)}</div></div>
    <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value">${products.length}</div></div>
    <div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-value" style="color:${lowStock? 'var(--red)' : 'inherit'}">${lowStock}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1.5rem">
    <div class="table-wrap">
      <div style="padding:1rem 1rem 0;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:500">Recent Orders</div>
      <table class="data-table"><thead><tr><th>Order</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
      <tbody>${orders.slice(0,5).map(o => `<tr><td>${o.id}</td><td>${o.date}</td><td><span class="badge-pill ${o.status==='delivered'?'badge-green':o.status==='shipped'?'badge-yellow':o.status==='processing'?'badge-gray':'badge-red'}">${o.status}</span></td><td>${formatPrice(o.total)}</td></tr>`).join('')}</tbody></table>
    </div>
    <div class="table-wrap">
      <div style="padding:1rem 1rem 0;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:500">Top Selling</div>
      <table class="data-table"><tbody>${products.slice(0,5).map(p => `<tr><td>${p.name}</td><td style="text-align:right">${formatPrice(p.price)}</td></tr>`).join('')}</tbody></table>
    </div>
  </div>`;
}

function renderAdminProducts() {
  const rows = products.map(p => {
    const low = p.stock <= 5;
    return `<tr>
      <td><img src="${p.image}" alt="${p.name}"></td>
      <td>${p.name}</td>
      <td>${getCategory(p.category)?.name}</td>
      <td>${formatPrice(p.salePrice||p.price)}</td>
      <td style="color:${low?'var(--red)':'inherit'};font-weight:${low?'600':'400'}">${p.stock}</td>
      <td><label class="toggle"><input type="checkbox" checked onchange="showToast('Status updated')"><span class="toggle-slider"></span></label></td>
      <td><a href="#/admin/products/${p.id}/edit" class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300)">${icons.edit}</a></td>
      <td><button class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300);color:var(--red)" onclick="deleteProduct(${p.id})">${icons.trash}</button></td>
    </tr>`;
  }).join('');
  return `
  <div class="admin-header"><h1>Products</h1><a href="#/admin/products/new" class="btn btn-primary btn-sm">Add Product</a></div>
  <div class="admin-search"><input type="text" class="form-input" placeholder="Search products..." oninput="filterAdminProducts(this.value)"></div>
  <div class="table-wrap">
    <table class="data-table"><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Active</th><th></th><th></th></tr></thead>
    <tbody id="adminProductTable">${rows}</tbody></table>
  </div>`;
}

function filterAdminProducts(q) {
  const term = q.toLowerCase();
  const filtered = products.filter(p => p.name.toLowerCase().includes(term));
  document.getElementById('adminProductTable').innerHTML = filtered.map(p => {
    const low = p.stock <= 5;
    return `<tr><td><img src="${p.image}" alt="${p.name}"></td><td>${p.name}</td><td>${getCategory(p.category)?.name}</td><td>${formatPrice(p.salePrice||p.price)}</td><td style="color:${low?'var(--red)':'inherit'};font-weight:${low?'600':'400'}">${p.stock}</td><td><label class="toggle"><input type="checkbox" checked onchange="showToast('Status updated')"><span class="toggle-slider"></span></label></td><td><a href="#/admin/products/${p.id}/edit" class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300)">${icons.edit}</a></td><td><button class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300);color:var(--red)" onclick="deleteProduct(${p.id})">${icons.trash}</button></td></tr>`;
  }).join('');
}

function deleteProduct(id) {
  confirmDelete('Delete this product?', () => {
    const idx = products.findIndex(p => p.id === id);
    if (idx > -1) { products.splice(idx, 1); showToast('Product deleted'); renderCurrentPage(); }
  });
}

function renderAdminProductForm(editId) {
  const p = editId ? getProductById(parseInt(editId)) : null;
  const isEdit = !!p;
  return `
  <div class="admin-header"><h1>${isEdit?'Edit':'New'} Product</h1></div>
  <div style="background:var(--white);border:1px solid var(--gray-200);padding:1.5rem;border-radius:4px;max-width:720px">
    <form id="productForm" onsubmit="event.preventDefault(); saveProduct(${isEdit?p.id:'null'});">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="pName" value="${p?p.name:''}" required></div>
        <div class="form-group"><label class="form-label">Slug</label><input class="form-input" id="pSlug" value="${p?p.slug:''}" required></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Category</label>
          <select class="form-select" id="pCat" required>
            ${categories.map(c => `<option value="${c.slug}" ${p&&p.category===c.slug?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Price</label><input type="number" class="form-input" id="pPrice" value="${p?p.price:''}" required></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Sale Price</label><input type="number" class="form-input" id="pSale" value="${p&&p.salePrice?p.salePrice:''}" placeholder="Leave blank for no sale"></div>
        <div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input" id="pStock" value="${p?p.stock:''}" required></div>
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="form-label">Description</label>
          <button type="button" class="btn btn-sm btn-ghost" onclick="aiGenerateDesc()">AI Generate Description</button>
        </div>
        <textarea class="form-textarea" id="pDesc" rows="4" required>${p?p.description:''}</textarea>
      </div>
      <div class="form-group"><label class="form-label">Details</label><textarea class="form-textarea" id="pDetails" rows="2">${p?p.details:''}</textarea></div>
      <div class="form-group"><label class="form-label">Shipping Info</label><textarea class="form-textarea" id="pShip" rows="2">${p?p.shipping:''}</textarea></div>
      <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1rem">
        <a href="#/admin/products" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">${isEdit?'Update':'Create'}</button>
      </div>
    </form>
  </div>`;
}

function aiGenerateDesc() {
  const btn = event.target;
  btn.classList.add('btn-loading');
  setTimeout(() => {
    document.getElementById('pDesc').value = 'Crafted with meticulous attention to detail, this exquisite piece embodies the pinnacle of luxury fashion. Its timeless silhouette and premium materials create an effortlessly elegant statement that transcends seasons. A true wardrobe essential for the discerning connoisseur.';
    btn.classList.remove('btn-loading');
    showToast('Description generated');
  }, 1200);
}

function saveProduct(editId) {
  const data = {
    id: editId || Date.now(),
    name: document.getElementById('pName').value,
    slug: document.getElementById('pSlug').value,
    category: document.getElementById('pCat').value,
    price: parseFloat(document.getElementById('pPrice').value),
    salePrice: parseFloat(document.getElementById('pSale').value) || null,
    stock: parseInt(document.getElementById('pStock').value),
    description: document.getElementById('pDesc').value,
    details: document.getElementById('pDetails').value,
    shipping: document.getElementById('pShip').value,
    image: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&h=800&fit=crop',
    thumbs: ['https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&h=800&fit=crop','https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600&h=800&fit=crop','https://images.unsplash.com/photo-1485968579580-b6d095142e6e?w=600&h=800&fit=crop','https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=600&h=800&fit=crop'],
    rating: 0, reviews: 0, new: true
  };
  const idx = products.findIndex(p => p.id === editId);
  if (idx > -1) products[idx] = {...products[idx], ...data};
  else products.push(data);
  showToast(editId ? 'Product updated' : 'Product created');
  navigate('/admin/products');
}

function renderAdminCategories() {
  const rows = categories.map((c,i) => `<tr><td>${c.name}</td><td>${c.slug}</td><td>${c.count}</td><td><a href="#" class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300)">${icons.edit}</a></td><td><button class="icon-btn" style="width:28px;height:28px;border:1px solid var(--gray-300);color:var(--red)" onclick="deleteCategory(${i})">${icons.trash}</button></td></tr>`).join('');
  return `
  <div class="admin-header"><h1>Categories</h1><button class="btn btn-primary btn-sm" onclick="addCategory()">Add Category</button></div>
  <div class="table-wrap">
    <table class="data-table"><thead><tr><th>Name</th><th>Slug</th><th>Products</th><th></th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}
function addCategory() {
  const name = prompt('Category name:'); if (!name) return;
  categories.push({ id: slugify(name), name, slug: slugify(name), count: 0 });
  renderCurrentPage(); showToast('Category added');
}
function deleteCategory(i) {
  confirmDelete('Delete this category?', () => { categories.splice(i,1); renderCurrentPage(); showToast('Category deleted'); });
}

function renderAdminOrders() {
  const rows = orders.map(o => {
    const statusClass = o.status==='delivered'?'badge-green':o.status==='shipped'?'badge-yellow':o.status==='processing'?'badge-gray':'badge-red';
    return `<tr style="cursor:pointer" onclick="navigate('/admin/orders/${o.id}')"><td>${o.id}</td><td>${o.date}</td><td><span class="badge-pill ${statusClass}">${o.status}</span></td><td>${formatPrice(o.total)}</td></tr>`;
  }).join('');
  return `
  <div class="admin-header"><h1>Orders</h1></div>
  <div class="status-filter">
    <button class="active" onclick="filterOrders('all',this)">All</button>
    <button onclick="filterOrders('processing',this)">Processing</button>
    <button onclick="filterOrders('shipped',this)">Shipped</button>
    <button onclick="filterOrders('delivered',this)">Delivered</button>
  </div>
  <div class="table-wrap">
    <table class="data-table"><thead><tr><th>Order ID</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
    <tbody id="adminOrderTable">${rows}</tbody></table>
  </div>`;
}
function filterOrders(status, btn) {
  document.querySelectorAll('.status-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? orders : orders.filter(o => o.status === status);
  document.getElementById('adminOrderTable').innerHTML = filtered.map(o => {
    const statusClass = o.status==='delivered'?'badge-green':o.status==='shipped'?'badge-yellow':o.status==='processing'?'badge-gray':'badge-red';
    return `<tr style="cursor:pointer" onclick="navigate('/admin/orders/${o.id}')"><td>${o.id}</td><td>${o.date}</td><td><span class="badge-pill ${statusClass}">${o.status}</span></td><td>${formatPrice(o.total)}</td></tr>`;
  }).join('');
}

function renderAdminOrderDetail(id) {
  const o = getOrder(id); if (!o) return '<h1>Order not found</h1>';
  const items = o.items.map(i => {
    const p = getProductById(i.productId); if (!p) return '';
    return `<tr><td><img src="${p.image}"></td><td>${p.name}</td><td>${i.qty}</td><td>${formatPrice((p.salePrice||p.price)*i.qty)}</td></tr>`;
  }).join('');
  const statusOptions = ['processing','shipped','delivered','cancelled'];
  return `
  <div class="admin-header"><h1>${o.id}</h1></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    <div class="table-wrap">
      <div style="padding:1rem 1rem 0;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:500">Items</div>
      <table class="data-table"><thead><tr><th></th><th>Product</th><th>Qty</th><th>Total</th></tr></thead><tbody>${items}</tbody></table>
    </div>
    <div>
      <div style="background:var(--white);border:1px solid var(--gray-200);padding:1.5rem;border-radius:4px;margin-bottom:1.5rem">
        <h3 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;font-weight:500">Shipping Address</h3>
        <p style="font-size:0.85rem;color:var(--gray-600);line-height:1.6">${o.shipping.name}<br>${o.shipping.address}<br>${o.shipping.city}, ${o.shipping.postcode}<br>${o.shipping.country}</p>
      </div>
      <div style="background:var(--white);border:1px solid var(--gray-200);padding:1.5rem;border-radius:4px">
        <h3 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;font-weight:500">Update Status</h3>
        <select class="form-select" id="orderStatus" onchange="updateOrderStatus('${o.id}',this.value)">
          ${statusOptions.map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <div id="orderMsg" class="notification success hidden" style="margin-top:1rem">Status updated.</div>
      </div>
    </div>
  </div>`;
}
function updateOrderStatus(id, status) {
  const o = getOrder(id); if (o) o.status = status;
  document.getElementById('orderMsg').classList.remove('hidden');
  setTimeout(() => document.getElementById('orderMsg').classList.add('hidden'), 3000);
}

function renderAdminCustomers() {
  const rows = customers.map(c => `<tr style="cursor:pointer" onclick="navigate('/admin/customers/${c.id}')"><td>${c.name}</td><td>${c.email}</td><td>${c.orders}</td><td>${c.joined}</td></tr>`).join('');
  return `
  <div class="admin-header"><h1>Customers</h1></div>
  <div class="table-wrap">
    <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Orders</th><th>Joined</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}
function renderAdminCustomerDetail(id) {
  const c = getCustomer(id); if (!c) return '<h1>Customer not found</h1>';
  const custOrders = orders.filter(o => o.shipping.email === c.email);
  return `
  <div class="admin-header"><h1>${c.name}</h1></div>
  <div class="customer-detail" style="margin-bottom:1.5rem">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;font-size:0.85rem">
      <div><strong>Email</strong><br>${c.email}</div>
      <div><strong>Phone</strong><br>${c.phone}</div>
      <div><strong>Joined</strong><br>${c.joined}</div>
      <div><strong>Total Orders</strong><br>${c.orders}</div>
    </div>
  </div>
  <h3 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;font-weight:500">Order History</h3>
  <div class="table-wrap">
    <table class="data-table"><thead><tr><th>Order ID</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
    <tbody>${custOrders.map(o => `<tr><td>${o.id}</td><td>${o.date}</td><td>${o.status}</td><td>${formatPrice(o.total)}</td></tr>`).join('')}</tbody></table>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function renderNotFound() {
  return `<div class="container" style="padding:6rem 0;text-align:center"><h2 style="font-size:2rem;margin-bottom:1rem">Page Not Found</h2><p style="color:var(--gray-500);margin-bottom:1.5rem">The page you are looking for does not exist.</p><a href="#/" class="btn btn-primary">Go Home</a></div>`;
}

window.addEventListener('hashchange', renderCurrentPage);
window.addEventListener('DOMContentLoaded', () => {
  renderCurrentPage();
  // skeleton simulation on product pages
  if (parseRoute().page === 'products' || parseRoute().page === 'category') {
    setTimeout(() => { const g = document.getElementById('productGrid'); if(g) applyFilters(); }, 500);
  }
});
</script>
</body>
</html>
