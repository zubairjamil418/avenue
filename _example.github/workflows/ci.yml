# =============================================================================
# Sellzy – Continuous Integration (lint + type-check)
# -----------------------------------------------------------------------------
# This workflow lives under `_example.github/` so it stays INACTIVE until you
# explicitly enable it. To activate, rename the parent folder:
#
#   mv _example.github .github
#
# Runs on every push to a non-main branch and on pull requests targeting
# main. It is a fast safety net BEFORE the deploy workflow takes over on
# main.
# =============================================================================
name: CI – Lint & Type-check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check-types
